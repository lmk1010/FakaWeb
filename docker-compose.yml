services:
  db:
    image: mysql:8.0
    container_name: acg-faka-db
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --sql-mode=
    environment:
      TZ: ${TZ:-UTC}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ChangeThisRootPass!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-acg_faka}
      MYSQL_USER: ${MYSQL_USER:-acg}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-acg123456}
      ACG_DB_PREFIX: ${DB_PREFIX:-acg_}
      ACG_ADMIN_EMAIL: ${ACG_ADMIN_EMAIL:-admin@example.com}
      ACG_ADMIN_NICKNAME: ${ACG_ADMIN_NICKNAME:-管理员}
      ACG_ADMIN_PASSWORD: ${ACG_ADMIN_PASSWORD:-Admin@123456}
    volumes:
      - db_data:/var/lib/mysql
      - ./kernel/Install/Install.sql:/docker-entrypoint-initdb.d/Install.sql:ro
      - ./docker/mysql-init/01-init-acg.sh:/docker-entrypoint-initdb.d/01-init-acg.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 15

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acg-faka-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - ${APP_PORT:-80}:80
    environment:
      TZ: ${TZ:-UTC}
      DB_HOST: db
      DB_DATABASE: ${MYSQL_DATABASE:-acg_faka}
      DB_USERNAME: ${MYSQL_USER:-acg}
      DB_PASSWORD: ${MYSQL_PASSWORD:-acg123456}
      DB_PREFIX: ${DB_PREFIX:-acg_}
    networks:
      - default
      - charity-network

volumes:
  db_data:

networks:
  charity-network:
    external: true
    name: charity-network
